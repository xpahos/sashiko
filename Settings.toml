log_level = "info"

[database]
url = "sashiko.db"
token = ""

[nntp]
server = "nntp.lore.kernel.org"
port = 119
groups = ["org.kernel.vger.linux-kernel"]

[ai]
provider = "gemini"
model = "gemini-3-flash-preview"
max_input_words = 150000
rate_limit_tokens_per_minute = 1900000
max_interactions = 50
temperature = 1.0
explicit_prompts_caching = true

[server]
host = "127.0.0.1"
port = 8080

[git]
repository_path = "linux"

[review]
concurrency = 1
worktree_dir = "review_trees"
timeout_seconds = 3600
max_retries = 3