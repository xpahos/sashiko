<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sashiko - Message</title>
    <style>
        body { font-family: sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; background: #f4f4f4; }
        .container { }
        h1 { margin-top: 0; }
        .meta { color: #666; font-size: 0.9em; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .meta div { margin-bottom: 4px; }
        .label { font-weight: bold; width: 60px; display: inline-block; }
        pre { 
            background: #f6f8fa; 
            color: #24292f;
            padding: 10px; 
            overflow-x: auto; 
            white-space: pre-wrap; 
            word-wrap: break-word; 
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; 
            font-size: 13px;
            line-height: 1.45;
            border: 1px solid #d0d7de;
            border-radius: 6px;
        }
        .diff-line { display: block; padding: 0 4px; min-height: 1.5em; }
        .diff-added { background-color: #e6ffec; color: #24292f; }
        .diff-removed { background-color: #ffebe9; color: #24292f; }
        .diff-header { color: #005cc5; font-weight: bold; }
        .copy-btn { margin-left: 10px; cursor: pointer; padding: 2px 8px; background: #eee; border: 1px solid #ccc; border-radius: 4px; font-size: 0.8em; }
        .copy-btn:hover { background: #ddd; }
        .nav { margin-bottom: 20px; }
        a { text-decoration: none; color: #007bff; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="nav">
        <a id="nav-back" href="/">← Back to List</a>
    </div>

    <div class="container" id="loading">Loading...</div>
    <div class="container" id="content" style="display:none">
        <h1 id="subject"></h1>
        <div class="meta">
            <div><span class="label">From:</span> <span id="author"></span></div>
            <div><span class="label">To:</span> <span id="to"></span></div>
            <div><span class="label">Cc:</span> <span id="cc"></span></div>
            <div><span class="label">Date:</span> <span id="date"></span></div>
            <div>
                <span class="label">Msg-ID:</span> <span id="msgid"></span>
                <button class="copy-btn" onclick="copyMsgId()">Copy ID</button>
            </div>
        </div>
        
        <div id="thread-section" style="margin-bottom: 20px; display: none;">
            <h3 style="border-bottom: 1px solid #eee; padding-bottom: 5px;">Thread History</h3>
            <div id="thread-tree" style="font-size: 0.9em;"></div>
        </div>

        <pre id="body"></pre>
    </div>

    <script>
        // Handle Back Navigation
        const navBack = document.getElementById('nav-back');
        if (document.referrer) {
            try {
                const refUrl = new URL(document.referrer);
                if (refUrl.origin === window.location.origin) {
                    navBack.href = document.referrer; // Set fallback link
                    
                    if (refUrl.pathname.includes('details.html')) {
                        navBack.innerText = '← Back to Patchset';
                    } else {
                        navBack.innerText = '← Back';
                    }

                    // Attempt to use history.back() for better UX (scroll restoration)
                    navBack.addEventListener('click', (e) => {
                         if (window.history.length > 1) {
                            e.preventDefault();
                            window.history.back();
                        }
                    });
                }
            } catch (e) {
                // Ignore parsing errors
            }
        }

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        async function copyMsgId() {
            const msgId = document.getElementById('msgid').innerText;
            try {
                await navigator.clipboard.writeText(msgId);
                const btn = document.querySelector('.copy-btn');
                const origText = btn.innerText;
                btn.innerText = 'Copied!';
                setTimeout(() => btn.innerText = origText, 2000);
            } catch (err) {
                console.error('Failed to copy!', err);
            }
        }

        function formatBody(text) {
            const lines = text.split('\n');
            return lines.map(line => {
                const escaped = escapeHtml(line);
                let className = 'diff-line';
                if (line.startsWith('+') && !line.startsWith('+++')) {
                    className += ' diff-added';
                } else if (line.startsWith('-') && !line.startsWith('--')) {
                    className += ' diff-removed';
                } else if (line.startsWith('@@') || line.startsWith('diff --git') || line.startsWith('--- ') || line.startsWith('+++ ')) {
                    className += ' diff-header';
                }
                
                return `<div class="${className}">${escaped}</div>`;
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function fetchMessage() {
            if (!id) {
                document.getElementById('loading').innerText = 'No message ID provided';
                return;
            }

            try {
                const res = await fetch(`/api/message?id=${id}`);
                if (!res.ok) throw new Error('Message not found');
                const data = await res.json();

                document.title = `Sashiko - ${data.subject}`;
                document.getElementById('subject').innerText = data.subject || '(No Subject)';
                document.getElementById('author').innerText = data.author || 'Unknown';
                document.getElementById('to').innerText = data.to || '-';
                document.getElementById('cc').innerText = data.cc || '-';
                document.getElementById('date').innerText = new Date(data.date * 1000).toLocaleString();
                document.getElementById('msgid').innerText = data.message_id;

                const bodyElem = document.getElementById('body');
                const subjectLine = `Subject: ${data.subject || '(No Subject)'}\n\n`;
                bodyElem.innerHTML = formatBody(subjectLine + (data.body || '(No body content)'));

                if (data.thread && data.thread.length > 0) {
                    renderThreadTree(data.thread, data.id);
                    document.getElementById('thread-section').style.display = 'block';
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch (e) {
                document.getElementById('loading').innerText = 'Error loading message: ' + e.message;
            }
        }

        function renderThreadTree(messages, currentMsgId) {
            const msgMap = new Map();
            const childrenMap = new Map();
            messages.forEach(m => {
                msgMap.set(m.message_id, m);
                childrenMap.set(m.message_id, []);
            });

            const roots = [];
            messages.forEach(m => {
                const parentId = m.in_reply_to;
                if (parentId && msgMap.has(parentId)) {
                    childrenMap.get(parentId).push(m);
                } else {
                    roots.push(m);
                }
            });

            let html = '<ul style="list-style: none; padding-left: 0;">';
            
            function renderNode(m, depth) {
                const isCurrent = m.id === currentMsgId;
                const style = isCurrent ? 'font-weight: bold; background-color: #eef;' : '';
                const mDate = m.date ? new Date(m.date * 1000).toLocaleDateString() : '-';
                const arrow = depth > 0 ? '↳ ' : '';
                
                html += `
                    <li style="margin-left: 20px; padding: 2px;">
                        <span style="color: #666; font-family: monospace;">[${mDate}]</span> 
                        ${m.author || 'unknown'}: 
                        ${arrow}<a href="/static/message.html?id=${m.id}" style="${style}">
                           ${m.subject || '(no subject)'}
                        </a>
                `;

                const children = childrenMap.get(m.message_id) || [];
                if (children.length > 0) {
                    html += '<ul style="list-style: none; padding-left: 0;">';
                    children.forEach(c => renderNode(c, depth + 1));
                    html += '</ul>';
                }
                html += '</li>';
            }

            roots.forEach(r => renderNode(r, 0));
            html += '</ul>';
            
            document.getElementById('thread-tree').innerHTML = html;
        }

        fetchMessage();

        // Keyboard Navigation
        document.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return;

            // Scroll Up
            if (e.key === 'k' || e.key === 'ArrowUp' || (e.ctrlKey && e.key === 'p')) {
                if (e.key === 'k' || (e.ctrlKey && e.key === 'p')) {
                    window.scrollBy(0, -50);
                }
            }
            // Scroll Down
            else if (e.key === 'j' || e.key === 'ArrowDown' || (e.ctrlKey && e.key === 'n')) {
                if (e.key === 'j' || (e.ctrlKey && e.key === 'n')) {
                    window.scrollBy(0, 50);
                }
            }
            // Back
            else if (e.key === 'q' || e.key === 'h' || e.key === 'ArrowLeft') {
                if (window.history.length > 1) {
                    window.history.back();
                } else {
                    window.location.href = '/';
                }
            }
        });
    </script>
</body>
</html>
