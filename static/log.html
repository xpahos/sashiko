<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sashiko Log</title>
    <style>
        :root {
            --col-user: #005cc5;
            --col-model: #24292e;
            --col-tool: #6a737d;
            --col-meta: #999;
            --bg-hl: #f6f8fa;
            --border: #e1e4e8;
        }

        body {
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
            font-size: 13px;
            line-height: 1.4;
            color: #24292e;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }

        /* Navigation similar to message.html */
        .nav { margin-bottom: 20px; }
        a.back-link { text-decoration: none; color: #007bff; }
        a.back-link:hover { text-decoration: underline; }

        /* Container similar to message.html/details.html */
        .container {
        }

        h1 {
            font-size: 1.4em;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .meta-header {
            font-size: 0.9em;
            color: var(--col-meta);
            margin-bottom: 20px;
        }

        .log-container {
            /* Removed border-top since H1 has border-bottom and is in same container */
        }

        .entry {
            display: flex;
            border-bottom: 1px solid #eee;
            padding: 6px 0;
        }

        .entry:last-child {
            border-bottom: none;
        }

        .entry:hover {
            background-color: var(--bg-hl);
        }

        .gutter {
            flex-shrink: 0;
            width: 80px;
            padding-right: 15px;
            text-align: right;
            font-weight: bold;
            font-size: 0.85em;
            user-select: none;
            color: var(--col-meta);
        }

        .content {
            flex-grow: 1;
            min-width: 0; /* for flex wrap */
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* Roles */
        .role-user .gutter { color: var(--col-user); }
        .role-model .gutter { color: var(--col-model); } 
        .role-tool .gutter { color: var(--col-tool); }

        .role-tool .content { color: var(--col-tool); }

        /* Tool Calls */
        .fn-call {
            font-family: inherit;
            color: #24292e; 
        }
        .fn-name { font-weight: bold; color: #6f42c1; }
        .fn-args { color: #24292e; }

        /* JSON & Collapsibles */
        details { display: inline-block; width: 100%; }
        summary { cursor: pointer; color: var(--col-meta); outline: none; }
        summary:hover { color: #0366d6; }
        
        pre {
            margin: 0;
            padding: 4px;
            background: #f6f8fa;
            border-radius: 3px;
            overflow-x: auto;
            font-family: inherit;
        }
        
        .inline-json {
            font-family: inherit;
            color: #555;
        }

        .error { color: #cb2431; }
        .loading { color: var(--col-meta); text-align: center; padding: 20px; }

        /* Unified Status Badge */
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.85em; font-weight: 500; border: 1px solid transparent; vertical-align: middle; }
        .status-Pending { background-color: #e3f2fd; color: #1565c0; border-color: #bbdefb; }
        .status-Applying, .status-Analyzing, .status-Reviewing { background-color: #fff3e0; color: #e65100; border-color: #ffe0b2; }
        .status-Finished, .status-Applied, .status-Reviewed { background-color: #e8f5e9; color: #2e7d32; border-color: #c8e6c9; }
        .status-Failed { background-color: #ffebee; color: #c62828; border-color: #ffcdd2; }
        .status-Incomplete { background-color: #f5f5f5; color: #616161; border-color: #e0e0e0; }

    </style>
</head>
<body>
    <div class="nav">
        <a href="javascript:history.back()" class="back-link">← Back</a>
    </div>

    <div class="container">
        <h1>
            Interaction Log
            <span id="header-meta" style="float: right; font-weight: normal; font-size: 0.7em; color: #777; margin-top: 4px;"></span>
        </h1>

        <div id="log-container" class="log-container">
            <div class="loading">Loading...</div>
        </div>
    </div>

    <script>
        async function fetchLog() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) {
                document.getElementById('log-container').innerHTML = '<div class="error">No ID provided.</div>';
                return;
            }

            try {
                const res = await fetch(`/api/review?id=${id}`);
                const data = await res.json();
                render(data);
            } catch (e) {
                document.getElementById('log-container').innerHTML = `<div class="error">Error: ${e.message}</div>`;
            }
        }

        function render(data) {
            // Header Stats
            const totalTokens = (data.tokens_in || 0) + (data.tokens_out || 0);
            document.getElementById('header-meta').innerHTML = 
                `${data.model || '?'} | Tokens: ${totalTokens} (${data.tokens_in || 0} in / ${data.tokens_out || 0} out) | <span class="status-badge status-${data.status}">${data.status}</span>`;

            const container = document.getElementById('log-container');
            container.innerHTML = '';

            let logs = [];
            try { logs = JSON.parse(data.logs || '[]'); } catch(e) { logs = []; }

            if (!Array.isArray(logs) || logs.length === 0) {
                container.innerHTML = '<div style="padding:20px; text-align:center; color:#777;">No logs recorded.</div>';
                return;
            }

            logs.forEach(entry => {
                const role = (entry.role || 'unknown').toLowerCase();
                const parts = entry.parts || [];
                
                // Determine row class
                let rowClass = 'entry';
                if (role === 'user') rowClass += ' role-user';
                else if (role === 'model') rowClass += ' role-model';
                else rowClass += ' role-tool';

                // Label
                let label = role;
                if (role === 'model') label = 'LLM';
                if (role === 'tool' || role === 'function') label = 'TOOL';
                
                // Content Generation
                let contentHtml = '';
                
                parts.forEach(part => {
                    if (part.text) {
                        contentHtml += formatText(part.text);
                    } 
                    else if (part.functionCall || part.function_call) {
                        const fc = part.functionCall || part.function_call;
                        const sig = formatSignature(fc.name, fc.args);
                        contentHtml += `<div class="fn-call"><span class="fn-name">${escapeHtml(sig.name)}</span>(<span class="fn-args">${escapeHtml(sig.args)}</span>)</div>`;
                    }
                    else if (part.functionResponse || part.function_response) {
                        const fr = part.functionResponse || part.function_response;
                        contentHtml += `<div><span style="opacity:0.6">➔ ${escapeHtml(fr.name)}:</span> ${formatJson(fr.response)}</div>`;
                    }
                });

                const div = document.createElement('div');
                div.className = rowClass;
                div.innerHTML = `
                    <div class="gutter">${label.toUpperCase()}</div>
                    <div class="content">${contentHtml}</div>
                `;
                container.appendChild(div);
            });
        }

        function formatText(text) {
            if (!text) return '';
            // Just basic escaping. Layout handles wrapping.
            return `<div>${escapeHtml(text)}</div>`;
        }

        function formatSignature(name, args) {
            // Flatten args for display
            if (typeof args === 'string') { try { args = JSON.parse(args); } catch(e){} }
            if (!args || typeof args !== 'object') return { name, args: '' };

            const pairs = [];
            const entries = Object.entries(args);
            
            // Sort keys
            // Priority: path/file_path > start_* > stop_*/end_* (matching start) > others
            entries.sort((a, b) => {
                const keyA = a[0];
                const keyB = b[0];

                const getPriority = (k) => {
                    if (k === 'file_path' || k === 'path' || k === 'dir_path') return 0;
                    if (k === 'start_line') return 10;
                    if (k === 'end_line' || k === 'stop_line') return 11;
                    if (k === 'start_column') return 20;
                    if (k === 'end_column' || k === 'stop_column') return 21;
                    if (k === 'start_byte') return 30;
                    if (k === 'end_byte' || k === 'stop_byte') return 31;
                    return 100;
                };

                const pA = getPriority(keyA);
                const pB = getPriority(keyB);
                
                if (pA !== pB) return pA - pB;
                return keyA.localeCompare(keyB);
            });

            for (const [k, v] of entries) {
                let valStr = JSON.stringify(v);
                if (valStr && valStr.length > 50) {
                    valStr = valStr.substring(0, 47) + '...';
                }
                pairs.push(`${k}=${valStr}`);
            }
            return { name, args: pairs.join(', ') };
        }

        function formatJson(obj) {
            const str = JSON.stringify(obj, null, 2);
            if (!str) return '<span class="inline-json">null</span>';

            // Clean inline check
            const singleLine = JSON.stringify(obj); // compacted
            if (singleLine.length < 100) {
                return `<span class="inline-json">${escapeHtml(singleLine)}</span>`;
            }

            // Multi-line
            return `
                <details>
                    <summary>JSON (${str.length} chars)</summary>
                    <pre>${escapeHtml(str)}</pre>
                </details>
            `;
        }

        function escapeHtml(str) {
            return (str || '').replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        fetchLog();
    </script>
</body>
</html>
